{% load static %}
<script>
  const theme = localStorage.getItem("theme") || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
  document.documentElement.setAttribute("data-bs-theme", theme);
  const _titles = [
    "An Unhelpful Detour",
    "A Highly Doubtful Shortcut",
    "The Least Helpful Link Tool",
    "Legally a Shortener",
    "A Shortener, Arguably",
    "An Alleged Shortcut",
    "Size Does Matter",
    "A Shortener, On Paper",
    "A Spectacularly Inefficient Shortcut",
    "The Scenic Route",
    "A Highly Questionable Detour",
  ];
  window.__siteTitle = _titles[Math.floor(Math.random() * _titles.length)];
  document.title = window.__siteTitle;
  window.__isAuthenticated = {% if user.is_authenticated %}true{% else %} false{% endif %};
</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
  integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"
  crossorigin="anonymous">
<link href="{% static 'urlapp/theme.css' %}" rel="stylesheet">
<link rel="shortcut icon" href="{% static 'urlapp/img/icon.png' %}">
