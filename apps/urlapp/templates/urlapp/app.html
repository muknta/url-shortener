{% load static %}
{% load django_vite %}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title></title>
  {% include "urlapp/_head.html" %}
  {% vite_hmr_client %}
  {% vite_asset 'src/main.js' %}
</head>

<body>
  <div id="page-container">
    <div id="content-wrap">
      <nav class="navbar navbar-expand-lg bg-body-tertiary sticky-top" id="navbar">
        <div class="container-fluid">
          <a class="navbar-brand" id="navbar-brand" href="/"></a>
          <button class="navbar-toggler" type="button" id="navbar-toggler"
            aria-controls="navbarSupportedContent" aria-expanded="false"
            aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto">
              <li class="nav-item">
                <a class="nav-link" href="/public-urls/">Public urls</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="/my-urls/">My urls</a>
              </li>
            </ul>
            <div class="d-flex align-items-center gap-2">
              {% if user.is_authenticated %}
              <a href="{% url 'profile' %}" class="btn btn-outline-secondary btn-sm">Profile</a>
              {% else %}
              <a href="{% url 'login' %}" class="btn btn-outline-secondary btn-sm">Log in</a>
              <a href="{% url 'register' %}" class="btn btn-primary btn-sm">Sign up</a>
              {% endif %}
              {% include "urlapp/_theme_toggle.html" %}
            </div>
          </div>
        </div>
      </nav>

      <div id="content">
        <div id="app"></div>
      </div>

      <div id="footer">
        <div class="images">
          <a href="https://github.com/muknta/">
            <span class="icons"><i class="fab fa-github"></i></span>
          </a>
          <a href="https://www.linkedin.com/in/muknta/">
            <span class="icons"><i class="fab fa-linkedin"></i></span>
          </a>
        </div>
      </div>
    </div>
  </div>

  <script>document.getElementById("navbar-brand").textContent = window.__siteTitle;</script>
  <script src="{% static 'urlapp/theme.js' %}"></script>
  <script>
    (function () {
      var toggler = document.getElementById('navbar-toggler');
      var collapseEl = document.getElementById('navbarSupportedContent');
      if (!toggler || !collapseEl) return;
      collapseEl.addEventListener('show.bs.collapse', function () { toggler.setAttribute('aria-expanded', 'true'); });
      collapseEl.addEventListener('hide.bs.collapse', function () { toggler.setAttribute('aria-expanded', 'false'); });
      toggler.addEventListener('click', function () {
        if (window.bootstrap && bootstrap.Collapse) {
          bootstrap.Collapse.getOrCreateInstance(collapseEl, { toggle: false }).toggle();
        } else {
          var open = collapseEl.classList.toggle('show');
          toggler.setAttribute('aria-expanded', open.toString());
        }
      });
    })();
  </script>
</body>

</html>
