{% load static %}
{% load django_vite %}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UrlShortener</title>
  <link rel="shortcut icon" href="{% static 'urlapp/img/icon.png' %}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.8.1/css/all.min.css">
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css"
    integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
  <link rel="stylesheet" href="{% static 'urlapp/main.css' %}">
  {% vite_hmr_client %}
  {% vite_asset 'src/main.js' %}
</head>

<body>
  <div id="page-container">
    <div id="content-wrap">
      <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top" id="navbar">
        <a class="navbar-brand" href="/">UrlShortener</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent"
          aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav mr-auto">
            <li class="nav-item">
              <a class="nav-link" href="/nobodys-urls/">Nobody's urls</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/my-urls/">My urls</a>
            </li>
          </ul>
          <ul class="nav navbar-nav navbar-right">
            <li class="right">
              {% if user.is_authenticated %}
              <a href="{% url 'profile' %}" class="btn btn-outline-warning">Profile</a>
              {% else %}
              <a href="{% url 'login' %}" class="btn btn-outline-warning">Log in</a>
              {% endif %}
            </li>
          </ul>
        </div>
      </nav>

      <div id="content">
        <div id="app"></div>
      </div>

      <div id="footer">
        <div class="images">
          <a href="https://github.com/muknta/">
            <span class="icons"><i class="fab fa-github fa-3px"></i></span>
          </a>
          <a href="https://www.linkedin.com/in/muknta/">
            <span class="icons"><i class="fab fa-linkedin"></i></span>
          </a>
        </div>
      </div>
    </div>
  </div>
</body>

</html>
