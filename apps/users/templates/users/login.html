{% extends "urlapp/base.html" %}
{% load crispy_forms_tags %}

{% block title %}
<title>Log in</title>
{% endblock title %}

{% block content %}
	<div class="content-section">
		<form method="POST">
			{% csrf_token %}
			<fieldset>
				<legend class="border-bottom mb-4">Log in</legend>
				{{ form|crispy }}
			</fieldset>
			<div class="mb-3">
				<button class="btn btn-primary" type="submit">Sign in</button>
				<small class="text-muted ms-2">
					<a href="{% url 'password_reset' %}">Forgot a password?</a>
				</small>
			</div>
		</form>
	</div>
{% endblock content %}
