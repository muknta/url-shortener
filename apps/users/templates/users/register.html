{% extends "urlapp/base.html" %}
{% load crispy_forms_tags %}
{% load i18n %}

{% block title %}
<title>{% trans "register_title" %}</title>
{% endblock title %}

{% block content %}
	<div class="content-section">
		<form method="POST">
			{% csrf_token %}
			<fieldset>
				<legend class="border-bottom mb-4">{% trans "register_heading" %}</legend>
				{{ form|crispy }}
			</fieldset>
			<div class="mb-3">
				<button class="btn btn-primary" type="submit">{% trans "register_button" %}</button>
			</div>
		</form>
	</div>
{% endblock content %}
